<div class="layout">

  <app-doctor-sidebar></app-doctor-sidebar>

  <main class="main-content">

    <div class="page">

      <header class="topbar">
        <div>
          <h1>Profile</h1>
        </div>

        <button routerLink="/doctor/dashboard">Back to Dashboard</button>
      </header>

      <div class="content-grid">

        <section class="form-card">
          <h2>Doctor Details</h2>

          <input placeholder="First name" [(ngModel)]="profile.firstName">
          <input placeholder="Last name" [(ngModel)]="profile.lastName">
          <input placeholder="Email" [(ngModel)]="profile.email">
          <input placeholder="Phone" [(ngModel)]="profile.phone">
          <input placeholder="Specialization" [(ngModel)]="profile.specialization">

          <button (click)="saveProfile()">
            Save Profile
          </button>
        </section>

        <section class="form-card">
          <h2>Change Password</h2>

          <input
            type="password"
            placeholder="Current password"
            [(ngModel)]="passwordForm.currentPassword"
          >

          <input
            type="password"
            placeholder="New password"
            [(ngModel)]="passwordForm.newPassword"
          >

          <button class="password-btn" (click)="changePassword()">
            Change Password
          </button>
        </section>

        <section class="form-card availability-card">
          <h2>Availability</h2>

         <div class="datepicker-wrapper">

          <mat-form-field appearance="fill" class="date-field">

            <input
            matInput
            readonly
            [matDatepicker]="startPicker"
            [(ngModel)]="availabilityForm.startDate"
            placeholder="Start date"
            (click)="startPicker.open()"
            (focus)="startPicker.open()"
          />

          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>

          </mat-form-field>

        </div>

        <div class="datepicker-wrapper">

          <mat-form-field appearance="fill" class="date-field">

            <input
            matInput
            readonly
            [matDatepicker]="endPicker"
            [(ngModel)]="availabilityForm.endDate"
            placeholder="End date"
            (click)="endPicker.open()"
            (focus)="endPicker.open()"
          />

          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>

          </mat-form-field>

        </div>

          <input
            placeholder="Reason"
            [(ngModel)]="availabilityForm.reason"
          >

          <button (click)="saveUnavailability()">
            Add Unavailability
          </button>

          <div class="unavailability-list" *ngIf="unavailabilityList.length > 0">
            <h3>Current Unavailability</h3>

            <div class="unavailability-item" *ngFor="let item of unavailabilityList">
              <div>
                <strong>
                  {{ item.startDate }} - {{ item.endDate }}
                </strong>

                <p>{{ item.reason }}</p>
              </div>

              <button
                class="delete-btn"
                (click)="deleteUnavailability(item.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </section>

      </div>

    </div>

  </main>

</div>
