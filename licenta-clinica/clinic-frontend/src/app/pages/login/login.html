<div class="login-container">

  <div class="login-card">

    <h1>Medical Clinic</h1>

    <p>Login to continue</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
