<div class="layout">

  <app-sidebar></app-sidebar>
  

    <main class="main-content">
      <div class="dashboard-page">

      <h1>Admin Dashboard</h1>
      

      <div class="cards mt-4" *ngIf="stats">

        <a class="card red" routerLink="/admin/doctors">
          <span>Doctors</span>
          <strong>{{ stats.totalDoctors }}</strong>
        </a>

        <a class="card blue" routerLink="/admin/patients">
          <span>Patients</span>
          <strong>{{ stats.totalPatients }}</strong>
        </a>

        <a class="card yellow" routerLink="/admin/consultations">
          <span>Consultations</span>
          <strong>{{ stats.totalConsultations }}</strong>
        </a>

        <a class="card green" routerLink="/admin/billing">
          <span>Revenue</span>
          <strong>{{ stats.revenue | number:'1.0-0' }} RON</strong>
        </a>

      </div>
      <div class="charts-grid">

        <div class="chart-card">
          <h3>Revenue Overview</h3>
           <div class="chart-toggle">

            <button
              [class.active]="chartMode === 'monthly'"
              (click)="setChartMode('monthly')"
            >
              Monthly
            </button>

            <button
              [class.active]="chartMode === 'daily'"
              (click)="setChartMode('daily')"
            >
              Daily
            </button>

          </div>  

          <canvas
            baseChart
            [data]="revenueChartData"
            [options]="chartOptions"
            [type]="'line'"
          >
          </canvas>
        </div>

        <div class="chart-card">
          <h3>Consultations</h3>

          <canvas
            baseChart
            [data]="consultationChartData"
            [options]="chartOptions"
            [type]="'bar'"
          >
          </canvas>
        </div>

      </div>

    </div>
  </main>
</div>
