<div class="layout">

  <app-sidebar></app-sidebar>
  

    <main class="main-content">
      <div class="dashboard-page">

      <h1>Admin Dashboard</h1>
      

      <div class="cards mt-4" *ngIf="stats">

        <div class="card red">
          <span>Doctors</span>
          <strong>{{ stats.totalDoctors }}</strong>
        </div>

        <div class="card blue">
          <span>Patients</span>
          <strong>{{ stats.totalPatients }}</strong>
        </div>

        <div class="card yellow">
          <span>Consultations</span>
          <strong>{{ stats.totalConsultations }}</strong>
        </div>

        <div class="card green">
          <span>Revenue</span>
          <strong>{{ stats.revenue | number:'1.0-0' }} RON</strong>
        </div>

      </div>
      <div class="charts-grid">

        <div class="chart-card">
          <h3>Revenue Overview</h3>

          <canvas
            baseChart
            [data]="revenueChartData"
            [options]="chartOptions"
            [type]="'line'"
          >
          </canvas>
        </div>

        <div class="chart-card">
          <h3>Consultations</h3>

          <canvas
            baseChart
            [data]="consultationChartData"
            [options]="chartOptions"
            [type]="'bar'"
          >
          </canvas>
        </div>

      </div>

    </div>
  </main>
</div>
