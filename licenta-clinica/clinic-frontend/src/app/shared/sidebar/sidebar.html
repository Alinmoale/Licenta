<aside class="sidebar">

  <div class="mobile-topbar">
    <div class="mobile-logo">
      <span class="material-icons">local_hospital</span>
      Admin Panel
    </div>

    <button class="menu-toggle" (click)="toggleMenu()">
      <span class="material-icons">menu</span>
    </button>
  </div>

  <div class="logo">
    <span class="material-icons">local_hospital</span>
    Admin Panel
  </div>

  <div class="sidebar-menu" [class.open]="isMenuOpen">

    <nav>

      <a routerLink="/admin/dashboard">
        <span class="material-icons">dashboard</span>
        Dashboard
      </a>

      <a routerLink="/admin/doctors">
        <span class="material-icons">medical_services</span>
        Doctors
      </a>

      <a routerLink="/admin/patients">
        <span class="material-icons">groups</span>
        Patients
      </a>

      <a routerLink="/admin/appointments">
        <span class="material-icons">event</span>
        Appointments
      </a>

      <a routerLink="/admin/consultations">
        <span class="material-icons">description</span>
        Consultations
      </a>

      <a routerLink="/admin/billing">
        <span class="material-icons">payments</span>
        Billing
      </a>

      <a routerLink="/admin/profile">
        <span class="material-icons">person</span>
        Profile
      </a>

    </nav>

    <button class="logout-btn" (click)="logout()">
      <span class="material-icons">logout</span>
      Logout
    </button>

  </div>

</aside>
